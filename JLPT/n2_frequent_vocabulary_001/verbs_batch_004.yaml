notes:
  - target: "省く"
    reading: "はぶく"
    meaning: "생략하다, 덜다"
    context: "無駄を省く"
    translation: "낭비를 덜어내다"
    memo: |
      [1차원/시각] 省: 目 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 타동사. 手順・説明・無駄를 목적어로 자주 받는다.
      [3차원/맥락] 無駄・手順・説明を省くが 단골이다. omit/cut out 의미가 핵심이다.
    _tags:
      - Verb
