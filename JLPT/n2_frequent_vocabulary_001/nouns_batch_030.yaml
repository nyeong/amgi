notes:
  - target: "汗"
    reading: "あせ"
    meaning: "땀"
    context: "汗を流して働く"
    translation: "땀 흘리며 일하다"
    memo: |
      [1차원/시각] 汗: 氵 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 汗をかく, 汗が出る가 기본 패턴이다.
      [3차원/맥락] 流す・かく・汗だく가 단골이다. 노력과 긴장의 비유로도 자주 쓰인다.
    tags:
      - Noun
  - target: "案外"
    reading: "あんがい"
    meaning: "의외, 예상 밖"
    context: "案外簡単だった"
    translation: "의외로 간단했다"
    memo: |
      [1차원/시각] 案: 木 부수, 형성자(形声). 外: 夕 부수, 회의자(会意). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사이자 부사적으로도 자주 쓰인다. 案外〜だ가 핵심이다.
      [3차원/맥락] 簡単・静か・多い와 자주 붙는다. 意外와 가깝지만 회화체에서 부드럽다.
    tags:
      - Noun
  - target: "安定"
    reading: "あんてい"
    meaning: "안정, 평온"
    context: "生活が安定する"
    translation: "생활이 안정되다"
    memo: |
      [1차원/시각] 安: 宀 부수, 회의자(会意). 定: 宀 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 安定する, 安定した収入처럼 자주 연결된다.
      [3차원/맥락] 生活・経済・供給が 단골이다. 불안정과 반대축으로 외우면 좋다.
    tags:
      - Noun
  - target: "胃"
    reading: "い"
    meaning: "위"
    context: "胃が痛む"
    translation: "위가 아프다"
    memo: |
      [1차원/시각] 胃: ⺼ 부수, 상형자(象形). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 胃痛, 胃腸처럼 의학 파생이 많다.
      [3차원/맥락] 痛む・弱い・胃薬が 단골이다. 건강 관련 지문에서 자주 보인다.
    tags:
      - Noun
  - target: "異常"
    reading: "いじょう"
    meaning: "이상, 비정상"
    context: "機械に異常がある"
    translation: "기계에 이상이 있다"
    memo: |
      [1차원/시각] 異: 田 부수, 상형자(象形). 常: 巾 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사이자 ナ형용동사 어간. 異常だ, 異常に도 자주 보인다.
      [3차원/맥락] 発見・気づく・異常気象이 단골이다. 단순 차이가 아니라 문제성 있는 다름이다.
    tags:
      - Noun
  - target: "泉"
    reading: "いずみ"
    meaning: "샘, 샘물"
    context: "泉の水が湧く"
    translation: "샘물이 솟다"
    memo: |
      [1차원/시각] 泉: 水 부수, 상형자(象形). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 温泉과 묶어 두면 기억이 잘 이어진다.
      [3차원/맥락] 水・湧く・自然が 단골이다. 자연·지리 문맥에서 자주 보인다.
    tags:
      - Noun
  - target: "一秒"
    reading: "いちびょう"
    meaning: "1초"
    context: "一秒を争う"
    translation: "1초를 다투다"
    memo: |
      [1차원/시각] 一: 一 부수, 지사자(指事). 秒: 禾 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 수량 표현. 시간 수와 함께 한 덩어리로 읽는다.
      [3차원/맥락] 争う・待つ・一秒後が 자주 붙는다. 긴급 상황에서 특히 자주 나온다.
    tags:
      - Noun
  - target: "移転"
    reading: "いてん"
    meaning: "이전, 이전함"
    context: "本社を移転する"
    translation: "본사를 이전하다"
    memo: |
      [1차원/시각] 移: 禾 부수, 형성자(形声). 転: 車 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 移転する, 移転先를 함께 기억한다.
      [3차원/맥락] 本社・工場・事務所의 이전이 단골이다. 移動보다 장기적 장소 변경이다.
    tags:
      - Noun
  - target: "移動"
    reading: "いどう"
    meaning: "이동, 이동함"
    context: "電車で移動する"
    translation: "전철로 이동하다"
    memo: |
      [1차원/시각] 移: 禾 부수, 형성자(形声). 動: 力 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 移動する, 移動時間처럼 자주 확장된다.
      [3차원/맥락] 手段・時間・移動中が 단골이다. 일시적 이동을 말할 때 기본어다.
    tags:
      - Noun
  - target: "違反"
    reading: "いはん"
    meaning: "위반"
    context: "規則に違反する"
    translation: "규칙을 위반하다"
    memo: |
      [1차원/시각] 違: 辶 부수, 회의겸형성자(会意形声). 反: 又 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 違反する, 違反者, 違反行為로 자주 파생된다.
      [3차원/맥락] 規則・法律・交通違反이 단골이다. 단순 실수보다 규범 위배가 핵심이다.
    tags:
      - Noun
  - target: "飲酒"
    reading: "いんしゅ"
    meaning: "음주, 술 마심"
    context: "飲酒運転を禁止する"
    translation: "음주운전을 금지하다"
    memo: |
      [1차원/시각] 飲: 飠 부수, 회의겸형성자(会意形声). 酒: 酉 부수, 회의겸형성자(会意形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사처럼도 보이나, 주로 복합 명사로 자주 쓰인다.
      [3차원/맥락] 運転・量・未成年の飲酒가 단골이다. 공공 규제 문맥에서 자주 보인다.
    tags:
      - Noun
  - target: "宇宙"
    reading: "うちゅう"
    meaning: "우주"
    context: "宇宙の仕組みを学ぶ"
    translation: "우주의 구조를 배우다"
    memo: |
      [1차원/시각] 宇: 宀 부수, 형성자(形声). 宙: 宀 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 宇宙船, 宇宙飛行士와 묶으면 기억이 잘 남는다.
      [3차원/맥락] 開発・観測・宇宙空間이 단골이다. 과학 지문에서 자주 보인다.
    tags:
      - Noun
  - target: "雨量"
    reading: "うりょう"
    meaning: "우량, 강수량"
    context: "雨量を観測する"
    translation: "강수량을 관측하다"
    memo: |
      [1차원/시각] 雨: 雨 부수, 상형자(象形). 量: 里 부수, 상형자(象形). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 年間雨量, 雨量計와 함께 익히면 좋다.
      [3차원/맥락] 観測・増える・記録的雨量이 자주 나온다. 날씨·재해 문맥의 핵심어다.
    tags:
      - Noun
  - target: "永遠"
    reading: "えいえん"
    meaning: "영원"
    context: "永遠に続くわけではない"
    translation: "영원히 계속되는 것은 아니다"
    memo: |
      [1차원/시각] 永: 水 부수, 상형자(象形). 遠: 辶 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사이자 부사적으로도 쓴다. 永遠に가 핵심 패턴이다.
      [3차원/맥락] 愛・命・続くと 자주 붙는다. 永久보다 감정적·철학적 뉘앙스가 더 있다.
    tags:
      - Noun
  - target: "永久"
    reading: "えいきゅう"
    meaning: "영구, 영속"
    context: "永久に保存する"
    translation: "영구히 보존하다"
    memo: |
      [1차원/시각] 永: 水 부수, 상형자(象形). 久: 丿 부수, 지사자(指事). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사이자 부사적 용법도 많다. 永久に가 중요하다.
      [3차원/맥락] 保存・保証・永久欠番이 단골이다. 永遠보다 제도·기술 문맥에 더 잘 맞는다.
    tags:
      - Noun
  - target: "絵具"
    reading: "えのぐ"
    meaning: "물감"
    context: "絵具で絵を描く"
    translation: "물감으로 그림을 그리다"
    memo: |
      [1차원/시각] 絵: 糹 부수, 형성자(形声). 具: 八 부수, 회의자(会意). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 画材와 함께 미술 문맥에서 자주 보인다.
      [3차원/맥락] 色・筆・水彩絵具가 단골이다. 미술 교육·취미 문맥에서 출제되기 쉽다.
    tags:
      - Noun
  - target: "応援"
    reading: "おうえん"
    meaning: "응원, 지원"
    context: "チームを応援する"
    translation: "팀을 응원하다"
    memo: |
      [1차원/시각] 応: 心 부수, 형성자(形声). 援: 扌 부수, 회의겸형성자(会意形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 応援する, 応援団, 応援歌를 함께 기억한다.
      [3차원/맥락] チーム・声援・応援メッセージ가 단골이다. 물리적 지원과 정서적 격려 둘 다 가능하다.
    tags:
      - Noun
  - target: "応対"
    reading: "おうたい"
    meaning: "응대, 대응"
    context: "丁寧に応対する"
    translation: "정중하게 응대하다"
    memo: |
      [1차원/시각] 応: 心 부수, 형성자(形声). 対: 寸 부수, 상형자(象形). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 接客 응대 문맥에서 특히 많이 쓴다.
      [3차원/맥락] 丁寧・電話・窓口応対가 단골이다. 対応보다 사람 대면 서비스 느낌이 강하다.
    tags:
      - Noun
  - target: "欧米"
    reading: "おうべい"
    meaning: "구미, 유럽과 미국"
    context: "欧米の文化に触れる"
