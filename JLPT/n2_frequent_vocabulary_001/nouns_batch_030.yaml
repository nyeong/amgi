      [2차원/문법] 명사. 欧米諸国, 欧米型처럼 합성어가 많다.
      [3차원/맥락] 文化・市場・欧米諸国이 단골이다. 일본어 기사체에서 자주 보이는 묶음 표현이다.
    tags:
      - Noun
  - target: "大声"
    reading: "おおごえ"
    meaning: "큰 목소리"
    context: "大声で叫ぶ"
    translation: "큰 소리로 외치다"
    memo: |
      [1차원/시각] 大: 大 부수, 상형자(象形). 声: 士 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 大声で가 대표 부사형 패턴이다.
      [3차원/맥락] 叫ぶ・笑う・注意する가 자주 붙는다. 단순한 loud voice보다 행위성과 함께 기억한다.
