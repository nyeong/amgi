notes:
  - target: "忙しい"
    reading: "いそがしい"
    meaning: "바쁘다, 분주하다"
    context: "仕事で忙しい"
    translation: "일 때문에 바쁘다"
    memo: |
      [1차원/시각] 忙은 마음(心)이 망(亡)할 만큼 쫓기는 모습이라 바쁨이 직관적이다.
      [2차원/문법] い형용사. 忙しくて, 忙しさ까지 변화형을 같이 익힌다.
      [3차원/맥락] 仕事・年末・毎日と 잘 붙는다. 単순히 할 일 많음을 말하는 기본어다.
    tags:
      - Adjective
  - target: "涼しい"
    reading: "すずしい"
    meaning: "선선하다, 시원하다"
    context: "涼しい風が吹く"
    translation: "선선한 바람이 불다"
    memo: |
      [1차원/시각] さんずい와 京가 만나 맑고 서늘한 공기 느낌을 떠올리기 좋다.
      [2차원/문법] い형용사. 涼しさ, 涼しげだ처럼 파생도 자주 보인다.
      [3차원/맥락] 風・朝・気候와 잘 붙는다. 冷たい보다 '기분 좋은 서늘함'이다.
    tags:
      - Adjective
  - target: "乏しい"
    reading: "とぼしい"
    meaning: "부족하다, 결핍되다"
    context: "資源が乏しい"
    translation: "자원이 부족하다"
    memo: |
      [1차원/시각] 少한 것이 더 줄어든 모양으로 잡으면 '채워질 게 모자람'이 느껴진다.
      [2차원/문법] い형용사. 乏しさ, 乏しくなる 형태 변화가 자연스럽다.
      [3차원/맥락] 資源・経験・表情に乏しい가 단골이다. 少ない보다 질적 빈약함이 강하다.
    tags:
      - Adjective
  - target: "貧しい"
    reading: "まずしい"
    meaning: "가난하다, 빈곤하다"
    context: "貧しい家庭に育つ"
    translation: "가난한 가정에서 자라다"
    memo: |
      [1차원/시각] 貝(재물)가 적고 나눌 여유가 없는 모습이라 경제적 궁핍이 바로 보인다.
      [2차원/문법] い형용사. 貧しさ, 貧しくなる와 함께 외운다.
      [3차원/맥락] 家庭・地域・暮らし와 자주 결합한다. 乏しい보다 생활 형편의 빈곤에 가깝다.
    tags:
      - Adjective
  - target: "珍しい"
    reading: "めずらしい"
    meaning: "드물다, 희귀하다"
    context: "珍しい例だ"
    translation: "드문 사례다"
    memo: |
      [1차원/시각] 王과 구슬(朱) 이미지로 '귀하게 여길 만큼 드묾'을 떠올리면 쉽다.
      [2차원/문법] い형용사. 珍しがる, 珍しさ 같은 파생형도 기억한다.
      [3차원/맥락] 例・動物・名字와 잘 붙는다. 単순히 uncommon일 뿐 꼭 좋은 뜻은 아니다.
    tags:
      - Adjective
