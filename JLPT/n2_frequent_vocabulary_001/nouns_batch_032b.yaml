notes:
  - target: "節約"
    reading: "せつやく"
    meaning: "절약, 아낌"
    context: "電気を節約する"
    translation: "전기를 절약하다"
    memo: |
      [1차원/시각] 節: ⺮ 부수, 형성자(形声). 約: 糹 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 節約する, 節約術, 節約家로 자주 확장된다.
      [3차원/맥락] 電気・時間・お金の節約이 단골이다. 倹約과 비슷하지만 생활 전반에 넓게 쓰인다.
    _tags:
      - Noun
  - target: "戦争"
    reading: "せんそう"
    meaning: "전쟁"
    context: "戦争の歴史を学ぶ"
    translation: "전쟁의 역사를 배우다"
    memo: |
      [1차원/시각] 戦: 戈 부수, 형성자(形声). 争: 亅 부수, 회의자(会意). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 戦争中, 戦争状態처럼 자주 확장된다.
      [3차원/맥락] 歴史・平和・戦争被害가 단골이다. 사회·역사 지문에서 핵심어다.
    _tags:
      - Noun
  - target: "全部"
    reading: "ぜんぶ"
    meaning: "전부, 모두"
    context: "全部読み終える"
    translation: "전부 다 읽어 끝내다"
    memo: |
      [1차원/시각] 全: 入 부수, 회의자(会意). 部: 阝 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사이자 부사처럼도 자주 쓴다. 全部で 패턴도 중요하다.
      [3차원/맥락] 終える・食べる・全部でいくらが 단골이다. すべて보다 회화체에 가깝다.
    _tags:
      - Noun
  - target: "相談"
    reading: "そうだん"
    meaning: "상담, 상의"
    context: "先生に相談する"
    translation: "선생님께 상담하다"
    memo: |
      [1차원/시각] 相: 目 부수, 회의자(会意). 談: 言 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 相談する, 相談相手, ご相談が 자주 보인다.
      [3차원/맥락] 先生・家族・事前に相談が 단골이다. 문제 해결을 위한 대화 느낌이 강하다.
    _tags:
      - Noun
  - target: "底"
    reading: "そこ"
    meaning: "밑바닥, 바닥"
    context: "箱の底を見る"
    translation: "상자의 바닥을 보다"
    memo: |
      [1차원/시각] 底: 广 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 底に, 心の底에서처럼 비유 확장도 많다.
      [3차원/맥락] 底に沈む・底力・心の底が 단골이다. 가장 아래라는 공간감이 핵심이다.
    _tags:
      - Noun
  - target: "祖父"
    reading: "そふ"
    meaning: "할아버지"
    context: "祖父と暮らす"
    translation: "할아버지와 살다"
    memo: |
      [1차원/시각] 祖: 礻 부수, 회의겸형성자(会意形声). 父: 父 부수, 회의자(会意). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 祖母와 짝으로 외우면 가족어가 정리된다.
      [3차원/맥락] 祖父母・田舎の祖父・祖父の家가 단골이다. 家族 소개 문맥의 기본어다.
    _tags:
      - Noun
  - target: "損得"
    reading: "そんとく"
    meaning: "손득, 이해득실"
    context: "損得を考える"
    translation: "손익을 따지다"
    memo: |
      [1차원/시각] 損: 扌 부수, 형성자(形声). 得: 彳 부수, 회의겸형성자(会意形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 損得勘定처럼 복합 표현이 매우 잦다.
      [3차원/맥락] 考える・抜きで・損得勘定が 단골이다. 감정보다 이익 계산에 초점이 있다.
    _tags:
      - Noun
  - target: "互"
    reading: "たがい"
    meaning: "서로"
    context: "互いに助け合う"
    translation: "서로 돕다"
    memo: |
      [1차원/시각] 互: 二 부수, 상형자(象形). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사이자 부사적으로 쓴다. 互いに가 핵심 패턴이다.
      [3차원/맥락] 助け合う・理解する・互いの立場가 단골이다. 相互보다 회화적이다.
    _tags:
      - Noun
  - target: "畳"
    reading: "たたみ"
    meaning: "다다미"
    context: "畳の部屋に座る"
    translation: "다다미방에 앉다"
    memo: |
      [1차원/시각] 畳: 田 부수, 회의자(会意). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 畳の部屋, 六畳間처럼 일본 생활문화 표현에 자주 나온다.
      [3차원/맥락] 部屋・和室・畳の上が 단골이다. 일본 문화 문맥의 대표어다.
    _tags:
      - Noun
  - target: "谷"
    reading: "たに"
    meaning: "계곡, 골짜기"
    context: "谷に川が流れる"
    translation: "계곡에 강이 흐르다"
    memo: |
      [1차원/시각] 谷: 谷 부수, 상형자(象形). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 渓谷와 연결해 지형어를 묶기 좋다.
      [3차원/맥락] 深い谷・谷底・谷を越える가 단골이다. 지형 묘사에서 자주 보인다.
    _tags:
      - Noun
  - target: "他人"
    reading: "たにん"
    meaning: "타인, 남"
    context: "他人に頼らない"
    translation: "타인에게 의지하지 않다"
    memo: |
      [1차원/시각] 他: 亻 부수, 회의겸형성자(会意形声). 人: 人 부수, 상형자(象形). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 他人事, 他人同士처럼 파생 표현도 많다.
      [3차원/맥락] 頼る・迷惑をかける・他人事が 단골이다. 身内가 아닌 남이라는 감각이 중요하다.
    _tags:
      - Noun
  - target: "束"
    reading: "たば"
    meaning: "다발, 묶음"
    context: "花を一束買う"
    translation: "꽃 한 다발을 사다"
    memo: |
      [1차원/시각] 束: 木 부수, 상형자(象形). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 수량 단위처럼도 자주 쓰인다.
      [3차원/맥락] 花・紙・一束が 단골이다. 여러 개를 묶은 단위를 나타낸다.
    _tags:
      - Noun
  - target: "卵"
    reading: "たまご"
    meaning: "달걀"
    context: "卵をゆでる"
    translation: "달걀을 삶다"
    memo: |
      [1차원/시각] 卵: 卩 부수, 상형자(象形). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. ゆで卵, 卵焼き처럼 파생 음식 표현이 많다.
      [3차원/맥락] 割る・産む・卵料理가 단골이다. 비유적으로 '신인' 뜻도 알아두면 좋다.
    _tags:
      - Noun
  - target: "単純"
    reading: "たんじゅん"
    meaning: "단순, 간단함"
    context: "構造が単純だ"
    translation: "구조가 단순하다"
    memo: |
      [1차원/시각] 単: 口 부수, 상형자(象形). 純: 糹 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사이자 ナ형용동사 어간. 単純だ, 単純に를 함께 외운다.
      [3차원/맥락] 構造・作業・単純計算이 단골이다. 複雑과 반대축으로 기억한다.
    _tags:
      - Noun
  - target: "団体"
    reading: "だんたい"
    meaning: "단체, 조직"
    context: "地域の団体に参加する"
    translation: "지역 단체에 참가하다"
    memo: |
      [1차원/시각] 団: 囗 부수, 형성자(形声). 体: 亻 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 団体行動, 団体客처럼 자주 파생된다.
      [3차원/맥락] 地域・支援団体・団体行動이 단골이다. 組織보다 집합체 느낌이 더 강하다.
    _tags:
      - Noun
  - target: "担当"
    reading: "たんとう"
    meaning: "담당, 담당자"
    context: "営業を担当する"
    translation: "영업을 담당하다"
    memo: |
      [1차원/시각] 担: 扌 부수, 형성자(形声). 当: ⺌ 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사이자 명사. 担当する, 担当者가 모두 매우 흔하다.
      [3차원/맥락] 営業・担当者・担当部署가 단골이다. 직무 분담 문맥의 핵심어다.
    _tags:
      - Noun
  - target: "遅刻"
    reading: "ちこく"
    meaning: "지각"
    context: "会議に遅刻する"
    translation: "회의에 지각하다"
    memo: |
      [1차원/시각] 遅: 辶 부수, 형성자(形声). 刻: 刂 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 遅刻する, 遅刻者로도 확장된다.
      [3차원/맥락] 会議・学校・遅刻の理由가 단골이다. 시간 약속 위반 문맥에서 자주 보인다.
    _tags:
      - Noun
  - target: "兆"
    reading: "ちょう"
    meaning: "조, 조짐"
    context: "一兆円を超える"
    translation: "1조 엔을 넘다"
    memo: |
      [1차원/시각] 兆: 儿 부수, 상형자(象形). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 수량 단위 접미처럼 쓰인다. 숫자와 한 덩어리다.
      [3차원/맥락] 円・兆候와 연결해 보기도 좋다. 경제 기사에서 큰 규모 수치에 자주 보인다.
    _tags:
      - Noun
  - target: "超過"
    reading: "ちょうか"
    meaning: "초과, 넘침"
    context: "予算を超過する"
    translation: "예산을 초과하다"
    memo: |
      [1차원/시각] 超: 走 부수, 형성자(形声). 過: 辶 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 超過する, 超過料金이 대표적이다.
      [3차원/맥락] 予算・時間・定員超過가 단골이다. over limit의 느낌을 정확히 담는다.
    _tags:
      - Noun
  - target: "頂点"
    reading: "ちょうてん"
    meaning: "정점, 꼭대기"
    context: "人気が頂点に達する"
    translation: "인기가 정점에 이르다"
    memo: |
      [1차원/시각] 頂: 頁 부수, 형성자(形声). 点: 灬 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 頂点に立つ, 頂点に達する가 자주 보인다.
      [3차원/맥락] 人気・山・組織の頂点이 단골이다. 최고점의 이미지가 중요하다.
    _tags:
      - Noun
  - target: "貯金"
    reading: "ちょきん"
    meaning: "저금, 저축"
    context: "毎月貯金する"
    translation: "매달 저축하다"
    memo: |
      [1차원/시각] 貯: 貝 부수, 회의겸형성자(会意形声). 金: 金 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 貯金する, 貯金箱, 貯金額으로 자주 확장된다.
      [3차원/맥락] 毎月・将来のために・貯金箱が 단골이다. 소비와 반대되는 생활 습관어다.
    _tags:
      - Noun
  - target: "直接"
    reading: "ちょくせつ"
    meaning: "직접"
    context: "本人に直接聞く"
    translation: "본인에게 직접 묻다"
    memo: |
      [1차원/시각] 直: 目 부수, 회의자(会意). 接: 扌 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사이자 부사적 용법이 많다. 直接に보다 直接가 흔하다.
      [3차원/맥락] 聞く・会う・直接関係する가 단골이다. 間接과 반대축이다.
    _tags:
      - Noun
  - target: "常"
    reading: "つね"
    meaning: "항시, 평소"
    context: "常に注意する"
    translation: "항상 주의하다"
    memo: |
      [1차원/시각] 常: 巾 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사이자 부사적으로도 많이 쓰인다. 常に가 핵심 패턴이다.
      [3차원/맥락] 注意・意識・常識와 연결해 외우면 좋다. いつも보다 문어적이다.
    _tags:
      - Noun
  - target: "罪"
    reading: "つみ"
    meaning: "죄, 잘못"
    context: "罪を犯す"
    translation: "죄를 짓다"
    memo: |
      [1차원/시각] 罪: 罒 부수, 회의자(会意). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 罪悪感, 犯罪와 함께 연계하기 좋다.
      [3차원/맥락] 犯す・償う・重い罪가 단골이다. 법적 의미와 도덕적 의미를 함께 가진다.
    _tags:
      - Noun
  - target: "停車"
    reading: "ていしゃ"
    meaning: "정차"
    context: "次の駅で停車する"
    translation: "다음 역에 정차하다"
    memo: |
      [1차원/시각] 停: 亻 부수, 형성자(形声). 車: 車 부수, 상형자(象形). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 停車する, 停車駅로 자주 이어진다.
      [3차원/맥락] 駅・各駅停車・停車位置가 단골이다. 교통 안내 문맥에서 자주 보인다.
