schema: amgi_v1
name: JLPT_N2_Frequent_Vocabulary_001
required_fields:
  - target
  - reading
  - meaning
  - partOfSpeech
optional_fields:
  - notes
global_tags:
  - JLPT
  - N2
  - FrequentVocabulary
templates:
  - name: JP to KO
    front: |
      <div class="prompt prompt-jp">{{target}}</div>
    back: |
      {{FrontSide}}
      <hr id=answer>
      <div class="reading">{{reading}}</div>
      <div class="meaning">{{meaning}}</div>
      <div class="part-of-speech">{{partOfSpeech}}</div>
      <div class="notes">{{notes}}</div>
  - name: KO to JP
    front: |
      <div class="prompt prompt-ko">{{meaning}}</div>
      <div class="part-of-speech">{{partOfSpeech}}</div>
    back: |
      {{FrontSide}}
      <hr id=answer>
      <div class="target">{{target}}</div>
      <div class="reading">{{reading}}</div>
      <div class="notes">{{notes}}</div>
