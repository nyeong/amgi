      [1차원/시각] 消: 氵 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 자동사. 消す가 타동사 짝이다.
      [3차원/맥락] 電気・記憶・姿が消える가 단골이다. physical disappearance와 abstract disappearance 둘 다 중요하다.
