notes:
  "明らかだ":
    reading: "あきらかだ"
    meaning: "분명하다, 명백하다"
    context: "原因は明らかだ"
    translation: "원인은 분명하다"
    memo: |
      [1차원/시각] 明: 日 부수, 회의자(会意). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] ナ형용동사. 明らかに, 明らかさ로도 자주 쓴다.
      [3차원/맥락] 原因・違い・明らかになる가 단골이다. はっきり보다 문어체적이다.
    _tags:
      - Adjective
  "浅い":
    reading: "あさい"
    meaning: "얕다, 깊지 않다"
    context: "川が浅い"
    translation: "강이 얕다"
    memo: |
      [1차원/시각] 浅: 氵 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] い형용사. 浅さ, 浅くする처럼 활용된다.
      [3차원/맥락] 川・知識が浅い가 단골이다. 深い의 반대축으로 기억한다.
