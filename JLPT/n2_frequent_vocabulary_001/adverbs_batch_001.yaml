notes:
  "再び":
    reading: "ふたたび"
    meaning: "재차, 다시"
    context: "再び確認する"
    translation: "다시 확인하다"
    memo: |
      [1차원/시각] 再: 冂 부수, 회의자(会意). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 부사. 문두나 동사 앞에서 자연스럽게 쓴다.
      [3차원/맥락] 確認・挑戦・再び会う가 단골이다. もう一度보다 문어체적이다.
    _tags:
      - Adverb
  "次々と":
    reading: "つぎつぎと"
    meaning: "계속해서, 잇달아"
    context: "問題が次々と起こる"
    translation: "문제가 잇달아 일어나다"
    memo: |
      [1차원/시각] 次: 欠 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 부사. 반복적 연쇄를 나타내는 표현이다.
      [3차원/맥락] 起こる・現れる・次々と売れる가 단골이다. one after another nuance가 핵심이다.
    _tags:
      - Adverb
  "突然に":
    reading: "とつぜんに"
    meaning: "돌연, 갑자기"
    context: "突然に雨が降り出す"
    translation: "갑자기 비가 내리기 시작하다"
    memo: |
      [1차원/시각] 突: 穴 부수, 회의자(会意). 然: 灬 부수, 회의겸형성자(会意形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 부사. 突然だ보다 동작 수식용으로 많이 쓴다.
      [3차원/맥락] 雨・別れ・突然に現れる가 단골이다. abrupt start를 강조한다.
    _tags:
      - Adverb
