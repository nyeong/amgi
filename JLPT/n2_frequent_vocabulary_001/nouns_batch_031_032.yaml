notes:
  - target: "靴"
    reading: "くつ"
    meaning: "구두, 신발"
    context: "靴を脱ぐ"
    translation: "신발을 벗다"
    memo: |
      [1차원/시각] 靴: 革 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 履く와 함께 세트로 외워야 한다.
      [3차원/맥락] 脱ぐ・履く・靴箱が 단골이다. 혁신적 의미 없이 생활 기초어라 자주 나온다.
    tags:
      - Noun
  - target: "雲"
    reading: "くも"
    meaning: "구름"
    context: "雲が広がる"
    translation: "구름이 퍼지다"
    memo: |
      [1차원/시각] 雲: 雨 부수, 회의겸형성자(会意形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 雲一つない 같은 표현도 자주 보인다.
      [3차원/맥락] 空・流れる・厚い雲가 단골이다. 날씨 지문에서 기본 배경어다.
    tags:
      - Noun
  - target: "訓練"
    reading: "くんれん"
    meaning: "훈련, 트레이닝"
    context: "避難訓練を行う"
    translation: "피난 훈련을 하다"
    memo: |
      [1차원/시각] 訓: 言 부수, 형성자(形声). 練: 糹 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 訓練する, 訓練を受ける 둘 다 자주 쓴다.
      [3차원/맥락] 避難・実践・訓練不足이 단골이다. 練習보다 실전 대비성이 강하다.
