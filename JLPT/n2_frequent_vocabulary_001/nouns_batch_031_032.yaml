      - Noun
  - target: "計算"
    reading: "けいさん"
    meaning: "계산, 셈"
    context: "費用を計算する"
    translation: "비용을 계산하다"
    memo: |
      [1차원/시각] 計: 言 부수, 회의자(会意). 算: ⺮ 부수, 회의자(会意). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 計算する, 計算式, 計算上로 자주 확장된다.
      [3차원/맥락] 費用・速度・計算ミス가 단골이다. 숫자·판단 양쪽에서 쓰인다.
