      - Noun
  - target: "警告"
    reading: "けいこく"
    meaning: "경고, 주의"
    context: "警告を無視する"
    translation: "경고를 무시하다"
    memo: |
      [1차원/시각] 警: 言 부수, 회의겸형성자(会意形声). 告: 口 부수, 회의자(会意). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 警告する, 警告音, 最終警告가 자주 보인다.
      [3차원/맥락] 無視する・表示・警告音이 단골이다. 단순 조언보다 위험 신호가 강하다.
