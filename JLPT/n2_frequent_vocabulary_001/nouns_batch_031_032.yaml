      [1차원/시각] 形: 彡 부수, 형성자(形声). 式: 弋 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 形式的だ, 形式上로도 자주 파생된다.
      [3차원/맥락] 書類・試験形式・形式的が 단골이다. 내용보다 틀에 초점이 있다.
