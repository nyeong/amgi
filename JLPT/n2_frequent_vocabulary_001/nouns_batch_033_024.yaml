notes:
  "複雑":
    reading: "ふくざつ"
    meaning: "복잡, 복합"
    context: "事情が複雑になる"
    translation: "사정이 복잡해지다"
    memo: |
      [1차원/시각] 複: 衤 부수, 형성자(形声). 雑: 隹 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사이자 ナ형용동사 어간. 複雑だ, 複雑に가 모두 자주 쓰인다.
      [3차원/맥락] 事情・構造・気持ち와 잘 붙는다. 単純의 반대축으로 외우면 빠르다.
    _tags:
      - Noun
  "服装":
    reading: "ふくそう"
    meaning: "복장, 차림"
    context: "服装を整える"
    translation: "복장을 단정히 하다"
    memo: |
      [1차원/시각] 服: 月 부수, 형성자(形声). 装: 衣 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 服装が自由だ, 服装規定처럼 수식 확장이 쉽다.
      [3차원/맥락] 整える・指定・自由가 단골이다. 衣類보다 '입은 상태' 쪽 의미가 강하다.
    _tags:
      - Noun
  "変化":
    reading: "へんか"
    meaning: "변화, 변동"
    context: "気温の変化に気づく"
    translation: "기온 변화를 알아차리다"
    memo: |
      [1차원/시각] 変: 言 부수, 형성자(形声). 化: 匕 부수, 회의겸형성자(会意形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 変化する, 変化が大きい처럼 명사/동사 양쪽에서 쓴다.
      [3차원/맥락] 気温・状況・表情과 자주 붙는다. 変更보다 넓고 자연스러운 변화다.
    _tags:
      - Noun
  "変更":
    reading: "へんこう"
    meaning: "변경, 수정"
    context: "予定を変更する"
    translation: "예정을 변경하다"
    memo: |
      [1차원/시각] 変: 言 부수, 형성자(形声). 更: 曰 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 変更する, 変更点처럼 행정·업무 문맥에 자주 쓴다.
      [3차원/맥락] 予定・内容・設定과 잘 붙는다. 変化보다 의도적 조정의 느낌이 강하다.
    _tags:
      - Noun
  "帽子":
    reading: "ぼうし"
    meaning: "모자"
    context: "帽子をかぶる"
    translation: "모자를 쓰다"
    memo: |
      [1차원/시각] 帽: 巾 부수, 형성자(形声). 子: 子 부수, 상형자(象形). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. かぶる와 가장 자주 짝을 이룬다.
      [3차원/맥락] かぶる・脱ぐ・日差しよけ와 자주 연결된다. 안경처럼 착용 표현과 함께 외운다.
    _tags:
      - Noun
  "方針":
    reading: "ほうしん"
    meaning: "방침, 정책"
    context: "新しい方針を示す"
    translation: "새로운 방침을 제시하다"
    memo: |
      [1차원/시각] 方: 方 부수, 상형자(象形). 針: 釒 부수, 회의겸형성자(会意形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 方針を決める, 基本方針처럼 자주 확장된다.
      [3차원/맥락] 示す・決める・転換する가 단골이다. 정책·조직 운영 문맥에서 매우 잦다.
    _tags:
      - Noun
  "放送":
    reading: "ほうそう"
    meaning: "방송, 송출"
    context: "ニュースを放送する"
    translation: "뉴스를 방송하다"
    memo: |
      [1차원/시각] 放: 攵 부수, 형성자(形声). 送: 辶 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 放送する, 放送局, 生放送까지 함께 익히면 좋다.
      [3차원/맥락] ニュース・番組・生中継와 잘 붙는다. 전달 매체 문맥의 기본어다.
    _tags:
      - Noun
  "防犯":
    reading: "ぼうはん"
    meaning: "방범, 범죄 예방"
    context: "防犯カメラを設置する"
    translation: "방범 카메라를 설치하다"
    memo: |
      [1차원/시각] 防: 阝 부수, 형성자(形声). 犯: 犭 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 防犯対策, 防犯カメラ처럼 합성어가 매우 많다.
      [3차원/맥락] カメラ・意識・対策이 단골이다. 防災와 헷갈리지 않게 구분한다.
    _tags:
      - Noun
  "方法":
    reading: "ほうほう"
    meaning: "방법, 방식"
    context: "効果的な方法を探す"
    translation: "효과적인 방법을 찾다"
    memo: |
      [1차원/시각] 方: 方 부수, 상형자(象形). 法: 氵 부수, 회의자(会意). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 方法を考える, 使用方法처럼 넓게 쓰인다.
      [3차원/맥락] 効果的・具体的・改善方法이 자주 나온다. 手段과 비슷하지만 더 일반적이다.
    _tags:
      - Noun
  "訪問":
    reading: "ほうもん"
    meaning: "방문, 방문함"
    context: "工場を訪問する"
    translation: "공장을 방문하다"
    memo: |
      [1차원/시각] 訪: 言 부수, 형성자(形声). 問: 口 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 訪問する, 訪問先를 함께 기억한다.
      [3차원/맥락] 会社・工場・客先와 자주 붙는다. 来訪은 상대가 오는 쪽이다.
    _tags:
      - Noun
  "星":
    reading: "ほし"
    meaning: "별"
    context: "星が見える"
    translation: "별이 보이다"
    memo: |
      [1차원/시각] 星: 日 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 星形, 星空처럼 합성도 자연스럽다.
      [3차원/맥락] 空・夜・輝く가 단골이다. 희망이나 유명인 비유로도 자주 쓰인다.
    _tags:
      - Noun
  "骨":
    reading: "ほね"
    meaning: "뼈, 골자"
    context: "骨を折って働く"
    translation: "애써 일하다"
    memo: |
      [1차원/시각] 骨: 骨 부수, 회의자(会意). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 비유적으로 '핵심'이나 '수고' 뜻도 있다.
      [3차원/맥락] 骨を折る는 관용표현이다. 신체 의미와 비유 의미를 함께 잡아야 시험에 강하다.
    _tags:
      - Noun
  "祭":
    reading: "まつり"
    meaning: "축제, 제사"
    context: "夏祭りが開かれる"
    translation: "여름 축제가 열리다"
    memo: |
      [1차원/시각] 祭: 示 부수, 회의자(会意). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 지역 행사명 앞에 자주 붙는다.
      [3차원/맥락] 夏祭り・祭りの屋台가 단골이다. 행사·전통 문화 문맥에서 자주 나온다.
    _tags:
      - Noun
  "万一":
    reading: "まんいち"
    meaning: "만일, 혹시"
    context: "万一の場合に備える"
    translation: "만일의 경우에 대비하다"
    memo: |
      [1차원/시각] 万: 一 부수, 상형자(象形). 一: 一 부수, 지사자(指事). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사처럼도, 부사처럼도 쓴다. 万一の場合가 핵심 패턴이다.
      [3차원/맥락] 場合・事故・備える와 자주 붙는다. 확률은 낮지만 대비는 필요하다는 뉘앙스다.
    _tags:
      - Noun
  "湖":
    reading: "みずうみ"
    meaning: "호수"
    context: "湖の周りを歩く"
    translation: "호수 주변을 걷다"
    memo: |
      [1차원/시각] 湖: 氵 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 地名과 결합해 자주 보인다.
      [3차원/맥락] 周り・岸・景色와 잘 붙는다. 川처럼 흐르지 않고 고여 있다는 점이 핵심이다.
    _tags:
      - Noun
  "港":
    reading: "みなと"
    meaning: "항구"
    context: "港に船が集まる"
    translation: "항구에 배가 모이다"
    memo: |
      [1차원/시각] 港: 氵 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 港町, 空港과 함께 위치 개념을 넓힐 수 있다.
      [3차원/맥락] 船・貿易・到着이 단골이다. 교통·무역 지문의 배경어다.
    _tags:
      - Noun
  "未来":
    reading: "みらい"
    meaning: "미래, 앞날"
    context: "未来を考える"
    translation: "미래를 생각하다"
    memo: |
      [1차원/시각] 未: 木 부수, 상형자(象形). 来: 木 부수, 상형자(象形). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 未来のために, 未来像처럼 자주 확장된다.
      [3차원/맥락] 社会・技術・子どもたちの未来가 잘 붙는다. 将来보다 더 넓고 추상적이다.
    _tags:
      - Noun
  "昔":
    reading: "むかし"
    meaning: "옛날, 예전"
    context: "昔の写真を見る"
    translation: "옛 사진을 보다"
    memo: |
      [1차원/시각] 昔: 日 부수, 상형자(象形). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사이자 부사처럼도 쓰인다. 昔から가 핵심 표현이다.
      [3차원/맥락] 写真・話・暮らし와 자주 붙는다. 今と 대비되어 출제되기 쉽다.
    _tags:
      - Noun
  "虫":
    reading: "むし"
    meaning: "벌레, 곤충"
    context: "虫に刺される"
    translation: "벌레에 물리다"
    memo: |
      [1차원/시각] 虫: 虫 부수, 상형자(象形). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 虫歯, 虫取り처럼 파생어도 많다.
      [3차원/맥락] 刺される・鳴く・苦手だ가 단골이다. 감정 비유 표현에서도 종종 보인다.
    _tags:
      - Noun
  "娘":
    reading: "むすめ"
    meaning: "딸, 아가씨"
    context: "娘が大学に通う"
    translation: "딸이 대학에 다니다"
    memo: |
      [1차원/시각] 娘: 女 부수, 회의겸형성자(会意形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 가족 의미와 젊은 여성 의미가 함께 있다.
      [3차원/맥락] 息子와 짝으로 외우기 좋다. 문맥에 따라 '우리 딸'과 '젊은 여자'가 갈린다.
    _tags:
      - Noun
  "村":
    reading: "むら"
    meaning: "촌, 마을"
    context: "山の村に住む"
    translation: "산골 마을에 살다"
    memo: |
      [1차원/시각] 村: 木 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 町보다 작은 단위의 지역명이다.
      [3차원/맥락] 山村・村人・小さな村와 자주 붙는다. 지역 사회 문맥의 기본어다.
    _tags:
      - Noun
  "群れ":
    reading: "むれ"
    meaning: "무리, 떼"
    context: "鳥の群れが飛ぶ"
    translation: "새 떼가 날다"
    memo: |
      [1차원/시각] 群: 羊 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 群れる는 동사형으로 확장된다.
      [3차원/맥락] 鳥・魚・人の群れ가 단골이다. 개인보다 집단 움직임을 강조한다.
    _tags:
      - Noun
  "免許":
    reading: "めんきょ"
    meaning: "면허, 허가증"
    context: "運転免許を取る"
    translation: "운전면허를 따다"
    memo: |
      [1차원/시각] 免: 儿 부수, 회의자(会意). 許: 言 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 免許を取る, 免許証를 세트로 외운다.
      [3차원/맥락] 運転・資格・更新이 단골이다. 許可보다 공식 자격증 느낌이 강하다.
    _tags:
      - Noun
  "目的":
    reading: "もくてき"
    meaning: "목적, 목표"
    context: "目的を明確にする"
    translation: "목적을 명확히 하다"
    memo: |
      [1차원/시각] 目: 目 부수, 상형자(象形). 的: 白 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 目的地, 目的意識처럼 합성도 쉽다.
      [3차원/맥락] 明確・達成・手段과 자주 붙는다. 理由보다 의도된 목표라는 점이 중요하다.
    _tags:
      - Noun
  "約束":
    reading: "やくそく"
    meaning: "약속, 약정"
    context: "約束を守る"
    translation: "약속을 지키다"
    memo: |
      [1차원/시각] 約: 糹 부수, 형성자(形声). 束: 木 부수, 상형자(象形). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 約束する, 約束事로도 확장된다.
      [3차원/맥락] 守る・破る・時間の約束이 단골이다. 관계 신뢰와 함께 출제되기 쉽다.
    _tags:
      - Noun
  "家賃":
    reading: "やちん"
