      [1차원/시각] 要: 覀 부수, 회의자(会意). 求: 氺 부수, 상형자(象形). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 要求する, 要求水準, 要求事項로 자주 확장된다.
      [3차원/맥락] 説明・改善・権利要求이 단골이다. 要望보다 더 강한 압박감이 있다.
    _tags:
      - Noun
  "世の中":
    reading: "よのなか"
    meaning: "세상, 사회"
    context: "世の中の流れを読む"
    translation: "세상 흐름을 읽다"
    memo: |
      [1차원/시각] 世: 一 부수, 회의자(会意). 中: 丨 부수, 지사자(指事). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 世の中では, 世の中に出る처럼 구문이 많다.
      [3차원/맥락] 流れ・仕組み・厳しさ와 자주 붙는다. 世界보다 생활감 있는 '세상'이다.
    _tags:
      - Noun
