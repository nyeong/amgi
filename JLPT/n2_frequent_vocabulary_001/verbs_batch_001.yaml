notes:
  - target: "焦る"
    reading: "あせる"
    meaning: "안달하다, 초조해하다"
    context: "結果が出なくて焦る"
    translation: "결과가 나오지 않아 안달하다"
    memo: |
      [1차원/시각] 焦: 灬 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 자동사. 焦ってミスする처럼 연쇄 표현이 많다.
      [3차원/맥락] 結果・時間・焦ってしまう가 단골이다. 迷う보다 긴박감이 더 강하다.
    _tags:
      - Verb
  - target: "祝う"
    reading: "いわう"
    meaning: "축하하다"
    context: "合格を祝う"
    translation: "합격을 축하하다"
    memo: |
      [1차원/시각] 祝: 礻 부수, 회의자(会意). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 타동사. 人を祝う보다 〜を祝う가 자연스럽다.
      [3차원/맥락] 合格・結婚・誕生日を祝う가 단골이다. 喜ぶ와 달리 상대에게 표현하는 동작이다.
    _tags:
      - Verb
  - target: "補う"
    reading: "おぎなう"
    meaning: "보충하다, 메우다"
    context: "不足分を補う"
    translation: "부족분을 보충하다"
    memo: |
      [1차원/시각] 補: 衤 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 타동사. 足りない 부분을 목적어로 바로 받는다.
      [3차원/맥락] 不足・欠点・栄養を補う가 단골이다. 埋める보다 기능적 보충 느낌이 강하다.
    _tags:
      - Verb
  - target: "驚く"
