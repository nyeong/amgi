notes:
  - target: "与える"
    reading: "あたえる"
    meaning: "주다, 끼치다"
    context: "大きな影響を与える"
    translation: "큰 영향을 주다"
    memo: |
      [1차원/시각] 与: 一 부수, 회의겸형성자(会意形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 타동사. AにBを与える 문형이 핵심이다.
      [3차원/맥락] 影響・印象・機会와 자주 붙는다. くれる보다 문어체이고 폭넓다.
    tags:
      - Verb
  - target: "誤る"
    reading: "あやまる"
    meaning: "잘못하다, 그르치다"
    context: "判断を誤る"
    translation: "판단을 그르치다"
    memo: |
      [1차원/시각] 誤: 言 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 자동사처럼 보이지만 목적어를 취해 判断を誤る 식으로 자주 쓴다.
      [3차원/맥락] 判断・道・使い方와 결합한다. 謝る와 발음이 비슷하니 반드시 구분한다.
    tags:
      - Verb
  - target: "争う"
    reading: "あらそう"
    meaning: "다투다, 경쟁하다"
    context: "首位を争う"
    translation: "선두를 다투다"
    memo: |
      [1차원/시각] 争: 亅 부수, 회의자(会意). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 자동사/타동사 성격이 함께 느껴진다. ～を争う 패턴이 특히 중요하다.
      [3차원/맥락] 首位・権利・意見と 잘 붙는다. けんか보다 공식적 경쟁 문맥이 많다.
    tags:
      - Verb
  - target: "重ねる"
    reading: "かさねる"
    meaning: "겹치다, 거듭하다"
    context: "努力を重ねる"
    translation: "노력을 거듭하다"
    memo: |
      [1차원/시각] 重: 里 부수, 회의겸형성자(会意形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 타동사. 重なる와 자/타동사 짝으로 외워야 한다.
      [3차원/맥락] 努力・練習・経験と 자주 결합한다. 반복 누적의 뉘앙스가 강하다.
    tags:
      - Verb
  - target: "傾く"
    reading: "かたむく"
    meaning: "기울다, 쏠리다"
    context: "会社が傾く"
    translation: "회사가 기울다"
    memo: |
      [1차원/시각] 傾: 亻 부수, 회의겸형성자(会意形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 자동사. 傾ける가 타동사 짝이다.
      [3차원/맥락] 首・会社・考えが傾く처럼 물리적/비유적 둘 다 가능하다. 시험은 비유 의미를 자주 낸다.
    tags:
      - Verb
  - target: "決まる"
    reading: "きまる"
    meaning: "정해지다, 결정되다"
    context: "方針が決まる"
    translation: "방침이 정해지다"
    memo: |
      [1차원/시각] 決: 氵 부수, 회의겸형성자(会意形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 자동사. 決める와 자/타동사 짝으로 반드시 묶는다.
      [3차원/맥락] 方針・予定・勝負가 주어로 자주 온다. 완료된 상태에 초점이 있다.
    tags:
      - Verb
  - target: "異なる"
    reading: "ことなる"
    meaning: "다르다, 상이하다"
    context: "意見が異なる"
    translation: "의견이 다르다"
    memo: |
      [1차원/시각] 異: 田 부수, 상형자(象形). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 자동사. Aと異なる 형태로 비교 대상과 자주 연결된다.
      [3차원/맥락] 意見・文化・結果와 잘 붙는다. 違う보다 문어체적이고 객관적이다.
    tags:
      - Verb
  - target: "備える"
    reading: "そなえる"
    meaning: "갖추다, 대비하다"
    context: "災害に備える"
    translation: "재해에 대비하다"
    memo: |
      [1차원/시각] 備: 亻 부수, 회의겸형성자(会意形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 타동사. 能力を備える와 災害に備える 두 문형을 같이 외운다.
      [3차원/맥락] 機能・条件・災害와 자주 결합한다. 준비와 보유 의미가 함께 있다.
    tags:
      - Verb
  - target: "耕す"
    reading: "たがやす"
    meaning: "갈다, 경작하다"
    context: "畑を耕す"
    translation: "밭을 갈다"
    memo: |
      [1차원/시각] 耕: 耒 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 타동사. 농사 맥락의 목적어를 직접 취한다.
      [3차원/맥락] 畑・土地・土と 잘 붙는다. 비유적으로 学問を耕す 같은 표현도 알아두면 좋다.
    tags:
      - Verb
  - target: "疲れる"
    reading: "つかれる"
    meaning: "지치다, 피곤하다"
    context: "長時間歩いて疲れる"
    translation: "오랫동안 걸어서 지치다"
    memo: |
      [1차원/시각] 疲: 疒 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 자동사. 疲れた, 疲れやすい처럼 파생형도 자주 보인다.
      [3차원/맥락] 仕事・移動・気疲れ와 함께 나온다. 眠い와 달리 에너지 고갈 쪽이다.
    tags:
      - Verb
  - target: "続く"
    reading: "つづく"
    meaning: "계속되다, 이어지다"
    context: "雨が続く"
    translation: "비가 계속되다"
    memo: |
      [1차원/시각] 続: 糹 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 자동사. 続ける와 자/타동사 짝으로 외운다.
      [3차원/맥락] 雨・会議・人気가 주어로 자주 온다. 상태 지속을 나타내는 대표 동사다.
    tags:
      - Verb
  - target: "届く"
    reading: "とどく"
    meaning: "도달하다, 닿다"
    context: "荷物が届く"
    translation: "짐이 도착하다"
    memo: |
      [1차원/시각] 届: 尸 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 자동사. 届ける와 자/타동사 짝으로 기억한다.
      [3차원/맥락] 荷物・声・気持ちと 잘 붙는다. 물리적 도착과 마음 전달이 모두 가능하다.
    tags:
      - Verb
  - target: "流す"
    reading: "ながす"
    meaning: "흘리다, 흘려보내다"
    context: "汗を流す"
    translation: "땀을 흘리다"
    memo: |
      [1차원/시각] 流: 氵 부수, 회의자(会意). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 타동사. 流れる가 자동사 짝이다.
      [3차원/맥락] 涙・汗・音楽を流す가 단골이다. 흘리다와 방송하다 두 의미를 기억한다.
    tags:
      - Verb
  - target: "悩む"
    reading: "なやむ"
    meaning: "고민하다, 괴로워하다"
    context: "進路に悩む"
    translation: "진로를 두고 고민하다"
    memo: |
      [1차원/시각] 悩: 忄 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 자동사. ～に悩む 패턴이 기본이며 悩み는 명사형이다.
      [3차원/맥락] 進路・人間関係・経営と 자주 결합한다. 考える보다 감정 부담이 더 크다.
    tags:
      - Verb
  - target: "塗る"
    reading: "ぬる"
    meaning: "칠하다, 바르다"
    context: "壁にペンキを塗る"
    translation: "벽에 페인트를 칠하다"
    memo: |
      [1차원/시각] 塗: 土 부수, 회의겸형성자(会意形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 타동사. ぬるい와는 완전히 다른 단어다.
      [3차원/맥락] 壁・薬・クリームと 잘 붙는다. 試験에선 に/を 격조사 조합을 자주 본다.
    tags:
      - Verb
  - target: "拾う"
    reading: "ひろう"
    meaning: "줍다, 골라내다"
    context: "ごみを拾う"
    translation: "쓰레기를 줍다"
    memo: |
      [1차원/시각] 拾: 扌 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 타동사. 拾える는 가능형으로도 자주 보인다.
      [3차원/맥락] ごみ・落とし物・声を拾う처럼 물건과 정보 둘 다 줍는다.
    tags:
      - Verb
  - target: "含める"
    reading: "ふくめる"
    meaning: "포함하다, 넣다"
    context: "税金を含める"
    translation: "세금을 포함하다"
    memo: |
      [1차원/시각] 含: 口 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 타동사. ～を含めて는 접속적으로도 매우 자주 나온다.
      [3차원/맥락] 費用・全員・例外を含める가 단골이다. 入れる보다 '범위 안에 넣음'이 강하다.
    tags:
      - Verb
  - target: "守る"
    reading: "まもる"
    meaning: "지키다, 보호하다"
    context: "約束を守る"
    translation: "약속을 지키다"
    memo: |
      [1차원/시각] 守: 宀 부수, 회의자(会意). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 타동사. 규칙을 지키다와 사람을 지키다 두 축을 함께 익힌다.
      [3차원/맥락] 約束・ルール・伝統と 자주 붙는다. 보호와 준수 의미를 모두 가져간다.
    tags:
      - Verb
  - target: "認める"
    reading: "みとめる"
    meaning: "인정하다, 확인하다"
    context: "実力を認める"
    translation: "실력을 인정하다"
    memo: |
      [1차원/시각] 認: 言 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 타동사. 認める는 인정하다, 허가하다, 확인하다 뜻이 문맥별로 갈린다.
      [3차원/맥락] 実力・変化・ミスを認める가 자주 나온다. 承認する보다 일상성이 높다.
    tags:
      - Verb
  - target: "求める"
    reading: "もとめる"
    meaning: "구하다, 요구하다"
    context: "説明を求める"
    translation: "설명을 요구하다"
    memo: |
      [1차원/시각] 求: 氺 부수, 상형자(象形). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 타동사. 人材を求める, 理解を求める처럼 추상 명사와 잘 붙는다.
      [3차원/맥락] 説明・助け・人材と 자주 결합한다. 欲しがる보다 공식적이고 요구성이 있다.
    tags:
      - Verb
  - target: "雇う"
    reading: "やとう"
    meaning: "고용하다, 쓰다"
    context: "経験者を雇う"
    translation: "경험자를 고용하다"
    memo: |
      [1차원/시각] 雇: 隹 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 타동사. 雇われる와 수동형도 함께 외우면 실전에서 편하다.
      [3차원/맥락] 社員・経験者・一時的に雇う가 단골이다. 採用する보다 실제 고용 행위에 가깝다.
    tags:
      - Verb
  - target: "喜ぶ"
    reading: "よろこぶ"
    meaning: "기뻐하다, 반기다"
    context: "合格を喜ぶ"
    translation: "합격을 기뻐하다"
    memo: |
      [1차원/시각] 喜: 口 부수, 회의자(会意). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 자동사. 喜ばしい, 喜び 같은 파생어도 자주 나온다.
      [3차원/맥락] 合格・成功・知らせを喜ぶ가 단골이다. うれしい는 형용사, 喜ぶ는 동작이다.
    tags:
      - Verb
