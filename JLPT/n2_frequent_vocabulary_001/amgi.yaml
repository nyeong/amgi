schema: amgi_v1
name: JLPT_N2_Frequent_Vocabulary_001
css: |
  .card {
    font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans KR", sans-serif;
    font-size: 18px;
    text-align: left;
    color: #222;
    background: #fff;
    margin: 0;
    padding: 16px;
  }

  .sheet {
    max-width: 720px;
    margin: 0 auto;
  }

  .sheet-header {
    position: relative;
    padding: 0;
  }

  .deck-label {
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 8px;
  }

  .target {
    font-size: 30px;
    font-weight: 700;
    line-height: 1.3;
  }

  ruby rt {
    font-size: 0.52em;
    color: #666;
  }

  .card.is-furigana-hidden ruby rt {
    display: none;
  }

  .sheet-body {
    margin-top: 16px;
  }

  .hint-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 12px;
  }

  .hint-button {
    border: 1px solid #ccc;
    background: #f7f7f7;
    color: #333;
    font: inherit;
    font-size: 14px;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
  }

  .furigana-toggle.is-active {
    background: #333;
    color: #fff;
    border-color: #333;
  }

  .hint-block {
    display: none;
  }

  .hint-block.is-visible {
    display: block;
  }

  .hint-button.is-hidden {
    display: none;
  }

  .section {
    margin-top: 16px;
  }

  .section:first-child {
    margin-top: 0;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 6px;
  }

  .meaning {
    font-size: 24px;
    font-weight: 700;
    line-height: 1.35;
  }

  .context {
    font-size: 20px;
    line-height: 1.6;
  }

  .translation {
    font-size: 18px;
    line-height: 1.6;
    color: #333;
  }

  .memo {
    white-space: pre-wrap;
    font-family: "SF Mono", "Menlo", monospace;
    font-size: 13px;
    line-height: 1.7;
    color: #444;
  }

  #answer {
    border: 0;
    border-top: 1px solid #ddd;
    margin: 18px 0;
  }
global_tags:
  - JLPT
  - N2
  - FrequentVocabulary
note_schema:
  required_fields:
    - target
    - reading
    - meaning
    - context
    - translation
    - memo
  optional_fields:
    - rubyTarget
    - rubyContext
cards:
  - name: Recall Meaning
    default: true
    front: |
      <div class="sheet">
        <div class="deck-label">JLPT N2 Vocabulary</div>
        <div class="sheet-header">
          <div class="target">{{rubyTarget}}</div>
          <div class="hint-actions">
            <button class="hint-button" onclick="document.getElementById('context-hint').classList.add('is-visible'); this.style.display='none';">예문 보기</button>
            <button class="hint-button furigana-toggle" data-furigana-toggle="true" type="button">후리가나 숨기기</button>
          </div>
        </div>
        <div class="sheet-body">
          <div id="context-hint" class="section hint-block">
            <div class="section-label">Context</div>
            <div class="context">{{rubyContext}}</div>
          </div>
        </div>
      </div>
      <script>
        (function() {
          var storageKey = 'amgi.jlpt.showFurigana';
          var card = document.querySelector('.card');
          var buttons = Array.prototype.slice.call(
            document.querySelectorAll('[data-furigana-toggle]')
          );

          if (!card || buttons.length === 0) {
            return;
          }

          function apply(visible) {
            if (visible) {
              card.classList.remove('is-furigana-hidden');
            } else {
              card.classList.add('is-furigana-hidden');
            }

            buttons.forEach(function(button) {
              button.textContent = visible ? '후리가나 숨기기' : '후리가나 보기';
              button.setAttribute('aria-pressed', visible ? 'false' : 'true');
              if (visible) {
                button.classList.remove('is-active');
              } else {
                button.classList.add('is-active');
              }
            });
          }

          function visibleByDefault() {
            try {
              return localStorage.getItem(storageKey) !== 'hidden';
            } catch (error) {
              return !card.classList.contains('is-furigana-hidden');
            }
          }

          function persist(visible) {
            try {
              localStorage.setItem(storageKey, visible ? 'shown' : 'hidden');
            } catch (error) {
            }
          }

          apply(visibleByDefault());

          buttons.forEach(function(button) {
            if (button.dataset.furiganaBound === 'true') {
              return;
            }

            button.dataset.furiganaBound = 'true';
            button.addEventListener('click', function() {
              var nextVisible = card.classList.contains('is-furigana-hidden');
              apply(nextVisible);
              persist(nextVisible);
            });
          });
        })();
      </script>
    back: |
      {{FrontSide}}
      <hr id=answer>
      <div class="section">
        <div class="section-label">Target</div>
        <div class="target">{{rubyTarget}}</div>
      </div>
      <div class="section">
        <div class="section-label">Meaning</div>
        <div class="meaning">{{meaning}}</div>
      </div>
      <div class="section">
        <div class="section-label">Context</div>
        <div class="context">{{rubyContext}}</div>
      </div>
      <div class="section">
        <div class="section-label">Translation</div>
        <div class="translation">{{translation}}</div>
      </div>
      <div class="section">
        <div class="section-label">3D Memo</div>
        <div class="memo">{{memo}}</div>
      </div>
  - name: Recall Target
    front: |
