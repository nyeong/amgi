notes:
  - target: "痛み"
    reading: "いたみ"
    meaning: "통증, 아픔"
    context: "胸の痛みを訴える"
    translation: "가슴 통증을 호소하다"
    memo: |
      [1차원/시각] 痛은 병든 몸을 바늘로 찌르는 듯한 형상이라 '콕 쑤시는 아픔'이 바로 떠오른다.
      [2차원/문법] 명사. 형용사 痛い와 세트로 외우면 표현 확장이 쉽다.
      [3차원/맥락] 訴える・和らぐ와 자주 붙는다. JLPT에선 증상 설명 문맥의 단골어다.
    tags:
      - Noun
  - target: "印刷"
    reading: "いんさつ"
    meaning: "인쇄, 프린트"
    context: "資料を印刷する"
    translation: "자료를 인쇄하다"
    memo: |
      [1차원/시각] 印은 도장을 찍는 모양, 刷은 쓸어 찍어내는 느낌이라 '찍어서 복제함'이 핵심이다.
      [2차원/문법] サ변 명사라 印刷する로 바로 동사화된다.
      [3차원/맥락] 資料・両面・カラー와 잘 붙는다. 시험에서는 사무실 문맥에서 매우 흔하다.
    tags:
      - Noun
  - target: "腕"
    reading: "うで"
    meaning: "팔, 실력"
    context: "腕を磨く"
    translation: "실력을 갈고닦다"
    memo: |
      [1차원/시각] 月(육체)와 굽은 부분이 붙어 몸의 '팔'이 떠오른다.
      [2차원/문법] 명사. 신체 의미와 '솜씨' 의미가 함께 있으니 다의어로 묶어 기억한다.
      [3차원/맥락] 腕を組む는 '팔짱 끼다', 腕を磨く는 '실력 닦다'. 시험은 비유 의미를 자주 노린다.
    tags:
      - Noun
  - target: "延期"
    reading: "えんき"
    meaning: "연기, 미룸"
    context: "会議を延期する"
    translation: "회의를 연기하다"
    memo: |
      [1차원/시각] 延은 길게 끌고, 期는 시점을 뜻해 '기한을 뒤로 미룸'이 보인다.
      [2차원/문법] サ변 명사. 延期する, 延期になる 둘 다 익혀야 한다.
      [3차원/맥락] 中止와 비교가 포인트다. 延期는 취소가 아니라 일정 변경이다.
    tags:
      - Noun
  - target: "~億"
    reading: "おく"
    meaning: "억"
    context: "売上が一億円を超える"
    translation: "매출이 1억 엔을 넘다"
    memo: |
      [1차원/시각] 億은 사람과 뜻이 겹겹이 쌓인 큰 수의 덩어리 이미지로 잡으면 쉽다.
      [2차원/문법] 수 뒤에 붙는 접미 표현이다. 숫자와 함께 한 덩어리로 읽는다.
      [3차원/맥락] 売上・予算・人口와 자주 결합한다. 시험에서는 큰 규모 수치 판단에 나온다.
    tags:
      - Noun
  - target: "改札口"
    reading: "かいさつぐち"
    meaning: "개찰구"
    context: "改札口で待ち合わせる"
    translation: "개찰구에서 만나기로 하다"
    memo: |
      [1차원/시각] 改札은 표를 검사해 고치는 느낌, 口는 입구라 '표 검사 입구'가 된다.
      [2차원/문법] 복합 명사. 口가 붙어 장소 명사가 된다.
      [3차원/맥락] 駅・出口・集合과 잘 붙는다. 이동 동선 문제에서 자주 보인다.
    tags:
      - Noun
  - target: "回復"
    reading: "かいふく"
    meaning: "회복, 복구"
    context: "体力が回復する"
    translation: "체력이 회복되다"
    memo: |
      [1차원/시각] 回는 돌아오고 復은 다시 원상태로 복귀하는 느낌이다.
      [2차원/문법] サ변 명사. 回復する와 回復が早い처럼 명사/동사 둘 다 쓴다.
      [3차원/맥락] 体力・景気・信頼와 잘 붙는다. '떨어진 것이 다시 올라옴'이 공통핵심이다.
    tags:
      - Noun
  - target: "火山"
    reading: "かざん"
    meaning: "화산"
    context: "火山が噴火する"
    translation: "화산이 분화하다"
    memo: |
      [1차원/시각] 火와 山이 그대로 결합해 '불의 산'이라 이미지가 강하다.
      [2차원/문법] 명사. 관련 동사는 噴火する와 같이 묶는다.
      [3차원/맥락] 地震・噴火・灰와 세트다. 재해 지문에서 빈출이다.
    tags:
      - Noun
  - target: "環境"
    reading: "かんきょう"
    meaning: "환경, 여건"
    context: "環境を守る"
    translation: "환경을 지키다"
    memo: |
      [1차원/시각] 環은 둥글게 둘러싼 고리, 境은 경계선이라 '주변을 둘러싼 조건'이다.
      [2차원/문법] 명사. 環境問題・環境保護처럼 복합 명사 확장이 매우 쉽다.
      [3차원/맥락] 保護・改善・破壊와 자주 붙는다. 자연환경과 생활환경 둘 다 가능하다.
    tags:
      - Noun
  - target: "観察"
    reading: "かんさつ"
    meaning: "관찰"
    context: "変化を観察する"
    translation: "변화를 관찰하다"
    memo: |
      [1차원/시각] 観은 자세히 보고, 察은 살펴 헤아리는 것이라 '눈으로 보고 판단'이 된다.
      [2차원/문법] サ변 명사. 観察する, 観察力처럼 파생이 쉽다.
      [3차원/맥락] 変化・動物・様子와 잘 붙는다. 실험이나 자연 관찰 문맥에서 잦다.
    tags:
      - Noun
  - target: "乾燥"
    reading: "かんそう"
    meaning: "건조, 메마름"
    context: "肌の乾燥を防ぐ"
    translation: "피부 건조를 막다"
    memo: |
      [1차원/시각] 乾은 마른 깃발, 燥는 불처럼 바싹 마르는 느낌이라 '수분이 빠짐'이 핵심이다.
      [2차원/문법] サ변 명사. 乾燥する, 乾燥した空気처럼 형용사적으로도 자주 이어진다.
      [3차원/맥락] 空気・肌・季節과 잘 붙는다. 湿気와 대비해 외우면 빠르다.
    tags:
      - Noun
  - target: "観測"
    reading: "かんそく"
    meaning: "관측, 측정"
    context: "気温を観測する"
    translation: "기온을 관측하다"
    memo: |
      [1차원/시각] 観은 보고, 測은 재는 것이므로 '보고 재어 파악함'이다.
      [2차원/문법] サ변 명사. 観測する와 観測データ로 자주 확장된다.
      [3차원/맥락] 気温・天気・地震과 자주 결합한다. 観察보다 '수치화' 느낌이 강하다.
    tags:
      - Noun
  - target: "記事"
    reading: "きじ"
    meaning: "기사, 글"
    context: "記事を掲載する"
    translation: "기사를 게재하다"
    memo: |
      [1차원/시각] 記는 적어 남기고, 事는 사건이니 '사건을 기록한 글'로 잡힌다.
      [2차원/문법] 명사. 記事を書く, 記事が載る처럼 주어/목적어 양쪽에서 자주 쓴다.
      [3차원/맥락] 新聞・雑誌・ネット와 잘 붙는다. 記事内容 파악 문제가 자주 나온다.
    tags:
      - Noun
  - target: "規模"
    reading: "きぼ"
    meaning: "규모, 스케일"
    context: "被害の規模が大きい"
    translation: "피해 규모가 크다"
    memo: |
      [1차원/시각] 規는 자로 재는 기준, 模는 틀이라 '크기를 재는 틀'의 이미지다.
      [2차원/문법] 명사. 規模が大きい/小さい 패턴으로 자주 고정된다.
      [3차원/맥락] 被害・事業・工事와 잘 붙는다. サイズ보다 사회적 규모감이 강하다.
    tags:
      - Noun
  - target: "行事"
    reading: "ぎょうじ"
    meaning: "행사, 이벤트"
    context: "学校行事に参加する"
    translation: "학교 행사에 참가하다"
    memo: |
      [1차원/시각] 行은 실행, 事는 일이라 '정해진 일정을 갖고 치르는 일'이다.
      [2차원/문법] 명사. 学校行事, 年中行事처럼 앞말이 자주 붙는다.
      [3차원/맥락] 参加・中止・開催와 잘 붙는다. 행사 운영 문맥의 기본어다.
    tags:
      - Noun
  - target: "許可"
    reading: "きょか"
    meaning: "허가, 승인"
    context: "許可を得る"
    translation: "허가를 얻다"
    memo: |
      [1차원/시각] 許는 허락하고, 可는 가능하다는 뜻이라 '해도 좋다'가 핵심이다.
      [2차원/문법] サ변 명사. 許可する보다 許可を得る/受ける 패턴이 특히 잦다.
      [3차원/맥락] 無断・申請・許可証과 같이 나온다. 禁止의 반대축으로 외우면 좋다.
    tags:
      - Noun
  - target: "記録"
    reading: "きろく"
    meaning: "기록, 레코드"
    context: "記録を更新する"
    translation: "기록을 경신하다"
    memo: |
      [1차원/시각] 記는 적고 録은 남겨 저장하는 것이니 '남겨둔 데이터'다.
      [2차원/문법] サ변 명사. 記録する, 記録的처럼 파생이 폭넓다.
      [3차원/맥락] 更新する・残す・破る와 자주 붙는다. 경기와 조사 양쪽에서 나온다.
    tags:
      - Noun
  - target: "禁止"
    reading: "きんし"
    meaning: "금지, 금함"
    context: "駐車禁止の場所"
    translation: "주차 금지 구역"
    memo: |
      [1차원/시각] 禁은 신성한 곳에 막아 세우는 느낌, 止는 멈춤이라 '하지 못하게 막음'이다.
      [2차원/문법] サ변 명사. 禁止する 외에 N禁止로 간판 표현이 많다.
      [3차원/맥락] 駐車・立入・喫煙과 자주 붙는다. 許可와 함께 대비 출제된다.
    tags:
      - Noun
  - target: "空港"
    reading: "くうこう"
    meaning: "공항"
    context: "空港へ向かう"
    translation: "공항으로 향하다"
    memo: |
      [1차원/시각] 空는 하늘, 港은 항구라 '하늘의 항구'라고 기억하면 끝난다.
      [2차원/문법] 명사. 空港内, 空港バス처럼 합성어가 많다.
      [3차원/맥락] 到着・出発・警備와 함께 자주 나온다. 여행 지문의 핵심 배경어다.
    tags:
      - Noun
  - target: "経済"
    reading: "けいざい"
    meaning: "경제"
    context: "経済が成長する"
    translation: "경제가 성장하다"
    memo: |
      [1차원/시각] 経은 흐름, 済는 끝내고 구제함이라 '사회를 굴러가게 하는 흐름'으로 이해하면 좋다.
      [2차원/문법] 명사. 経済的, 経済学 등 파생어가 매우 많다.
      [3차원/맥락] 成長・発展・不況와 자주 결합한다. 사회·비즈니스 주제의 핵심어다.
    tags:
      - Noun
  - target: "警備"
    reading: "けいび"
    meaning: "경비, 보안"
    context: "空港の警備を強化する"
    translation: "공항 경비를 강화하다"
    memo: |
      [1차원/시각] 警은 경계하고, 備는 갖춰 대비하는 것이라 '위험을 막기 위한 준비'다.
      [2차원/문법] サ변 명사. 警備する보다 警備が厳しい, 警備員이 더 자주 보인다.
      [3차원/맥락] 強化・厳重・体制와 결합한다. 사고 예방 문맥의 단골어다.
    tags:
      - Noun
  - target: "景色"
    reading: "けしき"
    meaning: "경치, 풍경"
    context: "景色を眺める"
    translation: "경치를 바라보다"
    memo: |
      [1차원/시각] 景은 밝게 드러난 모습, 色은 색채라 '눈앞에 펼쳐진 모습'이 된다.
      [2차원/문법] 명사. 景色がいい, 景色を楽しむ 패턴으로 자주 쓴다.
      [3차원/맥락] 美しい・広がる・眺める와 잘 붙는다. 風景과 거의 비슷하지만 회화체에 친숙하다.
    tags:
      - Noun
  - target: "下宿"
    reading: "げしゅく"
    meaning: "하숙, 하숙집"
    context: "下宿先を探す"
    translation: "하숙할 곳을 찾다"
    memo: |
      [1차원/시각] 下는 몸을 맡기고, 宿은 묵는 곳이니 '남의 집에 묵음' 이미지다.
      [2차원/문법] 명사. 下宿する로도 쓰여 생활동사처럼 확장된다.
      [3차원/맥락] 学生・家賃・下宿先와 자주 나온다. 기숙사와의 차이도 알아두면 좋다.
    tags:
      - Noun
  - target: "欠点"
    reading: "けってん"
    meaning: "결점, 단점"
    context: "欠点を補う"
    translation: "결점을 보완하다"
    memo: |
      [1차원/시각] 欠은 빠져 있고, 点은 점 하나의 자리라 '빠진 부분'이 선명하다.
      [2차원/문법] 명사. 長所と欠点처럼 대조 구조로 자주 나온다.
      [3차원/맥락] 補う・改善する와 잘 붙는다. 短所보다 비교적 객관적 설명에서 많이 쓴다.
    tags:
      - Noun
  - target: "原因"
    reading: "げんいん"
    meaning: "원인"
    context: "事故の原因を調べる"
    translation: "사고 원인을 조사하다"
    memo: |
      [1차원/시각] 原은 근원, 因은 그에 얽힌 이유라 '일을 일으킨 뿌리'다.
      [2차원/문법] 명사. 原因で, 原因となる 같은 문형으로 자주 연결된다.
      [3차원/맥락] 結果와 짝으로 외운다. 시험은 原因→結果 추론을 자주 묻는다.
    tags:
      - Noun
  - target: "検査"
    reading: "けんさ"
    meaning: "검사, 점검"
    context: "荷物を検査する"
    translation: "짐을 검사하다"
    memo: |
      [1차원/시각] 検은 살펴보고, 査는 조사해 확인하는 것이라 '기준에 맞는지 확인'이다.
      [2차원/문법] サ변 명사. 健康検査, 検査結果처럼 복합어가 많다.
      [3차원/맥락] 受ける・行う・結果가 단골이다. 検査는 공식 점검 느낌이 강하다.
    tags:
      - Noun
  - target: "講義"
    reading: "こうぎ"
    meaning: "강의, 강좌"
    context: "講義を受ける"
    translation: "강의를 듣다"
    memo: |
      [1차원/시각] 講은 말로 풀어 설명하고, 義는 뜻을 밝히는 것이라 '의미를 설명하는 수업'이다.
      [2차원/문법] 명사. 講義する보다 講義を受ける가 기본 표현이다.
      [3차원/맥락] 大学・教授・出席과 잘 붙는다. 授業보다 대학식, 이론 중심 느낌이다.
    tags:
      - Noun
  - target: "強盗"
