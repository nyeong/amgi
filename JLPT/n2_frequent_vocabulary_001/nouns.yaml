notes:
  - target: "痛み"
    reading: "いたみ"
    meaning: "통증, 아픔"
    context: "胸の痛みを訴える"
    translation: "가슴 통증을 호소하다"
    memo: |
      [1차원/시각] 痛: 疒 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 형용사 痛い와 세트로 외우면 표현 확장이 쉽다.
      [3차원/맥락] 訴える・和らぐ와 자주 붙는다. JLPT에선 증상 설명 문맥의 단골어다.
    tags:
      - Noun
  - target: "印刷"
    reading: "いんさつ"
    meaning: "인쇄, 프린트"
    context: "資料を印刷する"
    translation: "자료를 인쇄하다"
    memo: |
      [1차원/시각] 印: 卩 부수, 회의자(会意). 刷: 刂 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사라 印刷する로 바로 동사화된다.
      [3차원/맥락] 資料・両面・カラー와 잘 붙는다. 시험에서는 사무실 문맥에서 매우 흔하다.
    tags:
      - Noun
  - target: "腕"
    reading: "うで"
    meaning: "팔, 실력"
    context: "腕を磨く"
    translation: "실력을 갈고닦다"
    memo: |
      [1차원/시각] 腕: ⺼ 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 신체 의미와 '솜씨' 의미가 함께 있으니 다의어로 묶어 기억한다.
      [3차원/맥락] 腕を組む는 '팔짱 끼다', 腕を磨く는 '실력 닦다'. 시험은 비유 의미를 자주 노린다.
    tags:
      - Noun
  - target: "延期"
    reading: "えんき"
    meaning: "연기, 미룸"
    context: "会議を延期する"
    translation: "회의를 연기하다"
    memo: |
      [1차원/시각] 延: 廴 부수, 형성자(形声). 期: 月 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 延期する, 延期になる 둘 다 익혀야 한다.
      [3차원/맥락] 中止와 비교가 포인트다. 延期는 취소가 아니라 일정 변경이다.
    tags:
      - Noun
  - target: "~億"
    reading: "おく"
    meaning: "억"
    context: "売上が一億円を超える"
    translation: "매출이 1억 엔을 넘다"
    memo: |
      [1차원/시각] 億: 亻 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 수 뒤에 붙는 접미 표현이다. 숫자와 함께 한 덩어리로 읽는다.
      [3차원/맥락] 売上・予算・人口와 자주 결합한다. 시험에서는 큰 규모 수치 판단에 나온다.
    tags:
      - Noun
  - target: "改札口"
    reading: "かいさつぐち"
    meaning: "개찰구"
    context: "改札口で待ち合わせる"
    translation: "개찰구에서 만나기로 하다"
    memo: |
      [1차원/시각] 改: 攵 부수, 형성자(形声). 札: 木 부수, 형성자(形声). 口: 口 부수, 상형자(象形). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 복합 명사. 口가 붙어 장소 명사가 된다.
      [3차원/맥락] 駅・出口・集合과 잘 붙는다. 이동 동선 문제에서 자주 보인다.
    tags:
      - Noun
  - target: "回復"
    reading: "かいふく"
    meaning: "회복, 복구"
    context: "体力が回復する"
    translation: "체력이 회복되다"
    memo: |
      [1차원/시각] 回: 囗 부수, 상형자(象形). 復: 彳 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 回復する와 回復が早い처럼 명사/동사 둘 다 쓴다.
      [3차원/맥락] 体力・景気・信頼와 잘 붙는다. '떨어진 것이 다시 올라옴'이 공통핵심이다.
    tags:
      - Noun
  - target: "火山"
    reading: "かざん"
    meaning: "화산"
    context: "火山が噴火する"
    translation: "화산이 분화하다"
    memo: |
      [1차원/시각] 火: 火 부수, 상형자(象形). 山: 山 부수, 상형자(象形). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 관련 동사는 噴火する와 같이 묶는다.
      [3차원/맥락] 地震・噴火・灰와 세트다. 재해 지문에서 빈출이다.
    tags:
      - Noun
  - target: "環境"
    reading: "かんきょう"
    meaning: "환경, 여건"
    context: "環境を守る"
    translation: "환경을 지키다"
    memo: |
      [1차원/시각] 環: 王 부수, 형성자(形声). 境: 土 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 環境問題・環境保護처럼 복합 명사 확장이 매우 쉽다.
      [3차원/맥락] 保護・改善・破壊와 자주 붙는다. 자연환경과 생활환경 둘 다 가능하다.
    tags:
      - Noun
  - target: "観察"
    reading: "かんさつ"
    meaning: "관찰"
    context: "変化を観察する"
    translation: "변화를 관찰하다"
    memo: |
      [1차원/시각] 観: 見 부수, 형성자(形声). 察: 宀 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 観察する, 観察力처럼 파생이 쉽다.
      [3차원/맥락] 変化・動物・様子와 잘 붙는다. 실험이나 자연 관찰 문맥에서 잦다.
    tags:
      - Noun
  - target: "乾燥"
    reading: "かんそう"
    meaning: "건조, 메마름"
    context: "肌の乾燥を防ぐ"
    translation: "피부 건조를 막다"
    memo: |
      [1차원/시각] 乾: 乙 부수, 형성자(形声). 燥: 火 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 乾燥する, 乾燥した空気처럼 형용사적으로도 자주 이어진다.
      [3차원/맥락] 空気・肌・季節과 잘 붙는다. 湿気와 대비해 외우면 빠르다.
    tags:
      - Noun
  - target: "観測"
    reading: "かんそく"
    meaning: "관측, 측정"
    context: "気温を観測する"
    translation: "기온을 관측하다"
    memo: |
      [1차원/시각] 観: 見 부수, 형성자(形声). 測: 氵 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 観測する와 観測データ로 자주 확장된다.
      [3차원/맥락] 気温・天気・地震과 자주 결합한다. 観察보다 '수치화' 느낌이 강하다.
    tags:
      - Noun
  - target: "記事"
    reading: "きじ"
    meaning: "기사, 글"
    context: "記事を掲載する"
    translation: "기사를 게재하다"
    memo: |
      [1차원/시각] 記: 言 부수, 형성자(形声). 事: 亅 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 記事を書く, 記事が載る처럼 주어/목적어 양쪽에서 자주 쓴다.
      [3차원/맥락] 新聞・雑誌・ネット와 잘 붙는다. 記事内容 파악 문제가 자주 나온다.
    tags:
      - Noun
  - target: "規模"
    reading: "きぼ"
    meaning: "규모, 스케일"
    context: "被害の規模が大きい"
    translation: "피해 규모가 크다"
    memo: |
      [1차원/시각] 規: 見 부수, 회의자(会意). 模: 木 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 規模が大きい/小さい 패턴으로 자주 고정된다.
      [3차원/맥락] 被害・事業・工事와 잘 붙는다. サイズ보다 사회적 규모감이 강하다.
    tags:
      - Noun
  - target: "行事"
    reading: "ぎょうじ"
    meaning: "행사, 이벤트"
    context: "学校行事に参加する"
    translation: "학교 행사에 참가하다"
    memo: |
      [1차원/시각] 行: 行 부수, 상형자(象形). 事: 亅 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 学校行事, 年中行事처럼 앞말이 자주 붙는다.
      [3차원/맥락] 参加・中止・開催와 잘 붙는다. 행사 운영 문맥의 기본어다.
    tags:
      - Noun
  - target: "許可"
    reading: "きょか"
    meaning: "허가, 승인"
    context: "許可を得る"
    translation: "허가를 얻다"
    memo: |
      [1차원/시각] 許: 言 부수, 형성자(形声). 可: 口 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 許可する보다 許可を得る/受ける 패턴이 특히 잦다.
      [3차원/맥락] 無断・申請・許可証과 같이 나온다. 禁止의 반대축으로 외우면 좋다.
    tags:
      - Noun
  - target: "記録"
    reading: "きろく"
    meaning: "기록, 레코드"
    context: "記録を更新する"
    translation: "기록을 경신하다"
    memo: |
      [1차원/시각] 記: 言 부수, 형성자(形声). 録: 釒 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 記録する, 記録的처럼 파생이 폭넓다.
      [3차원/맥락] 更新する・残す・破る와 자주 붙는다. 경기와 조사 양쪽에서 나온다.
    tags:
      - Noun
  - target: "禁止"
    reading: "きんし"
    meaning: "금지, 금함"
    context: "駐車禁止の場所"
    translation: "주차 금지 구역"
    memo: |
      [1차원/시각] 禁: 示 부수, 회의겸형성자(会意形声). 止: 止 부수, 상형자(象形). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 禁止する 외에 N禁止로 간판 표현이 많다.
      [3차원/맥락] 駐車・立入・喫煙과 자주 붙는다. 許可와 함께 대비 출제된다.
    tags:
      - Noun
  - target: "空港"
    reading: "くうこう"
    meaning: "공항"
    context: "空港へ向かう"
    translation: "공항으로 향하다"
    memo: |
      [1차원/시각] 空: 穴 부수, 형성자(形声). 港: 氵 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 空港内, 空港バス처럼 합성어가 많다.
      [3차원/맥락] 到着・出発・警備와 함께 자주 나온다. 여행 지문의 핵심 배경어다.
    tags:
      - Noun
  - target: "経済"
    reading: "けいざい"
    meaning: "경제"
    context: "経済が成長する"
    translation: "경제가 성장하다"
    memo: |
      [1차원/시각] 経: 糹 부수, 형성자(形声). 済: 氵 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 経済的, 経済学 등 파생어가 매우 많다.
      [3차원/맥락] 成長・発展・不況와 자주 결합한다. 사회·비즈니스 주제의 핵심어다.
    tags:
      - Noun
  - target: "警備"
    reading: "けいび"
    meaning: "경비, 보안"
    context: "空港の警備を強化する"
    translation: "공항 경비를 강화하다"
    memo: |
      [1차원/시각] 警: 言 부수, 회의겸형성자(会意形声). 備: 亻 부수, 회의겸형성자(会意形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] サ변 명사. 警備する보다 警備が厳しい, 警備員이 더 자주 보인다.
      [3차원/맥락] 強化・厳重・体制와 결합한다. 사고 예방 문맥의 단골어다.
    tags:
      - Noun
  - target: "景色"
    reading: "けしき"
    meaning: "경치, 풍경"
    context: "景色を眺める"
    translation: "경치를 바라보다"
    memo: |
      [1차원/시각] 景: 日 부수, 형성자(形声). 色: 色 부수, 상형자(象形). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 景色がいい, 景色を楽しむ 패턴으로 자주 쓴다.
      [3차원/맥락] 美しい・広がる・眺める와 잘 붙는다. 風景과 거의 비슷하지만 회화체에 친숙하다.
    tags:
      - Noun
  - target: "下宿"
    reading: "げしゅく"
    meaning: "하숙, 하숙집"
    context: "下宿先を探す"
    translation: "하숙할 곳을 찾다"
    memo: |
      [1차원/시각] 下: 一 부수, 지사자(指事). 宿: 宀 부수, 회의자(会意). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 下宿する로도 쓰여 생활동사처럼 확장된다.
      [3차원/맥락] 学生・家賃・下宿先와 자주 나온다. 기숙사와의 차이도 알아두면 좋다.
    tags:
      - Noun
  - target: "欠点"
    reading: "けってん"
    meaning: "결점, 단점"
    context: "欠点を補う"
    translation: "결점을 보완하다"
    memo: |
      [1차원/시각] 欠: 欠 부수, 형성자(形声). 点: 灬 부수, 형성자(形声). 먼저 각 글자의 부수와 성립부터 붙여 본다.
      [2차원/문법] 명사. 長所と欠点처럼 대조 구조로 자주 나온다.
      [3차원/맥락] 補う・改善する와 잘 붙는다. 短所보다 비교적 객관적 설명에서 많이 쓴다.
    tags:
