name: Build Deck Artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".forgejo/workflows/build-decks.yaml"
      - "JLPT/**"
      - "TOEIC/**"
      - "bin/**"
      - "lib/**"
      - "flake.nix"
      - "flake.lock"
      - "Gemfile"
      - "Gemfile.lock"
      - "gemset.nix"

jobs:
  build-decks:
    # If your Forgejo runner uses a different label, replace `docker`
    # with one of the labels shown in Settings -> Actions -> Runners.
    runs-on: docker

    permissions:
      contents: read

    steps:
      - name: Check out repository
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          CHECKOUT_URL_OVERRIDE: ${{ vars.FORGEJO_CHECKOUT_URL }}
          CHECKOUT_SSH_KEY: ${{ secrets.FORGEJO_CHECKOUT_SSH_KEY }}
          CHECKOUT_SSH_KNOWN_HOSTS: ${{ secrets.FORGEJO_CHECKOUT_SSH_KNOWN_HOSTS }}
          EVENT_CLONE_URL: ${{ github.event.repository.clone_url }}
          EVENT_HTML_URL: ${{ github.event.repository.html_url }}
          EVENT_SSH_URL: ${{ github.event.repository.ssh_url }}
          FETCH_SHA: ${{ github.sha }}
          AUTH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Avoid the runner-local checkout proxy because some docker runners
          # cannot reach the forwarded loopback endpoint.
          git config --global --add safe.directory "$PWD"

          repo_url="${CHECKOUT_URL_OVERRIDE:-}"
          if [[ -z "$repo_url" && -n "${CHECKOUT_SSH_KEY:-}" && -n "${EVENT_SSH_URL:-}" ]]; then
            repo_url="${EVENT_SSH_URL}"
          fi
          if [[ -z "$repo_url" ]]; then
            repo_url="${EVENT_CLONE_URL:-}"
          fi
          if [[ -z "$repo_url" ]]; then
            repo_url="${EVENT_HTML_URL:-${SERVER_URL}/${REPOSITORY}}"
          fi
          case "$repo_url" in
            *.git) ;;
            *) repo_url="${repo_url}.git" ;;
          esac

          echo "Using checkout URL: ${repo_url}"
          auth_args=()
          if [[ "$repo_url" == ssh://* || "$repo_url" == git@* ]]; then
            mkdir -p "$HOME/.ssh"
            chmod 700 "$HOME/.ssh"

            if [[ -n "${CHECKOUT_SSH_KEY:-}" ]]; then
              printf '%s\n' "$CHECKOUT_SSH_KEY" > "$HOME/.ssh/forgejo_checkout"
              chmod 600 "$HOME/.ssh/forgejo_checkout"
              export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/forgejo_checkout -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"
            else
              export GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=yes"
            fi

            if [[ -n "${CHECKOUT_SSH_KNOWN_HOSTS:-}" ]]; then
              printf '%s\n' "$CHECKOUT_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
            else
              ssh_host="$(printf '%s' "$repo_url" | sed -E 's#^ssh://([^@]+@)?([^/:]+).*#\2#; s#^[^@]+@([^:]+):.*#\1#')"
              ssh-keyscan -H "$ssh_host" >> "$HOME/.ssh/known_hosts" 2>/dev/null
            fi
          fi

          if [[ "$repo_url" != ssh://* && "$repo_url" != git@* && -n "${AUTH_TOKEN:-}" ]]; then
            basic_auth="$(printf 'x-access-token:%s' "$AUTH_TOKEN" | base64 | tr -d '\n')"
            auth_args=(-c "http.extraHeader=Authorization: Basic ${basic_auth}")
          fi

          git init -b main .
          git remote add origin "$repo_url"
          git "${auth_args[@]}" fetch --depth=1 --no-tags origin "$FETCH_SHA"
          git checkout --detach FETCH_HEAD

      - name: Install Nix
        uses: https://github.com/cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934
        env:
          # Forgejo also exposes GITHUB_TOKEN, but it is not a GitHub token.
          # Blank it here so the action does not inject an invalid token into nix.conf.
          GITHUB_TOKEN: ""
        with:
          install_options: --no-daemon

      - name: Build decks from JLPT and TOEIC
        shell: bash
        env:
          NIX_CONFIG: experimental-features = nix-command flakes
        run: |
          set -euo pipefail

          mkdir -p forgejo-artifacts
          built_count=0

          while IFS= read -r -d '' deck_dir; do
            config_path="${deck_dir}/amgi.yaml"
            if [[ ! -f "$config_path" ]]; then
              continue
            fi

            echo "Building ${deck_dir}"
            safe_name="${deck_dir//\//__}"
            output_path="forgejo-artifacts/${safe_name}/${safe_name}.apkg"
            mkdir -p "$(dirname "$output_path")"

            nix develop -c bin/amgi build "$deck_dir" -o "$output_path"

            if [[ ! -f "$output_path" ]]; then
              echo "No .apkg output found at ${output_path}" >&2
              exit 1
            fi

            built_count=$((built_count + 1))
          done < <(
            for root in JLPT TOEIC; do
              [[ -d "$root" ]] || continue
              find "$root" -mindepth 1 -maxdepth 1 -type d -print0
            done
          )

          if [[ "$built_count" -eq 0 ]]; then
            echo "No deck directories with amgi.yaml were found under JLPT/ or TOEIC/" >&2
            exit 1
          fi

          find forgejo-artifacts -type f | sort

      - name: Upload built decks
        uses: https://data.forgejo.org/forgejo/upload-artifact@v4
        with:
          name: built-decks
          path: forgejo-artifacts
          if-no-files-found: error
          retention-days: 30
