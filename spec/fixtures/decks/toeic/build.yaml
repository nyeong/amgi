schema: amgi_v1
name: TOEIC_Vocabulary
required_fields:
  - target
  - meaning
optional_fields:
  - example
  - blankExample
global_tags:
  - TOEIC
templates:
  - name: Card 1
    front: |
      <div class="target">{{target}}</div>
    back: |
      {{FrontSide}}
      <hr id=answer>
      <div class="meaning">{{meaning}}</div>
      <div class="example">{{example}}</div>
