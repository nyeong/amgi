schema: amgi_v1
name: TOEIC_Vocabulary
output: build/toeic-from-config.apkg
global_tags:
  - TOEIC
note_schema:
  id: "{{target}}"
  required_fields:
    - target
    - meaning
  optional_fields:
    - example
    - exampleBlank
cards:
  - name: Recall Meaning
    default: true
    front: |
      <div class="target">{{target}}</div>
    back: |
      {{FrontSide}}
      <hr id=answer>
      <div class="meaning">{{meaning}}</div>
      <div class="example">{{example}}</div>
  - name: Blank Example
    front: |
      <div class="example">{{exampleBlank}}</div>
    back: |
      {{FrontSide}}
      <hr id=answer>
      <div class="target">{{target}}</div>
      <div class="meaning">{{meaning}}</div>
