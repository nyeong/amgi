schema: amgi_v1
name: JLPT_CSS_Fixture
css: |
  .card {
    background: #f7f3e8;
  }

  .memo {
    white-space: pre-wrap;
  }
global_tags:
  - JLPT
note_schema:
  id: "{{target}}"
  required_fields:
    - target
    - meaning
  optional_fields: []
cards:
  - name: Card 1
    default: true
    front: |
      <div class="target">{{target}}</div>
    back: |
      {{FrontSide}}
      <div class="meaning">{{meaning}}</div>
      <div class="memo">sample</div>
