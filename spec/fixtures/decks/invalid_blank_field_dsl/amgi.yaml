schema: amgi_v1
name: InvalidBlankFieldDsl
note_schema:
  id: "{{target}}"
  required_fields:
    - target
    - meaning
  optional_fields:
    - example
    - exampleBlank
cards:
  - name: Recall Meaning
    default: true
    front: "{{target}}"
    back: "{{meaning}}"
  - name: Blank Example
    front: "{{exampleBlank}}"
    back: "{{example}}"
